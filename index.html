<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Culturama</title>
</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
        <fieldset>
                   DADOS PESSOAIS
            
            
                    <label for="name">Nome</label>
                    <input id="name" type="text" name="userName" required>
                    <br>        
                    <label for="age">Idade</label>
                    <input id="age" type="number" name="userAge" min="12" max="100">
                    <br>
                    <label for="birth">Data de nascimento</label>
                    <input id="birth" type="date" name="birthDate">
                    <br>
                    <label for="email">Email</label>
                    <input id="email" type="email" name="userEmail" required>
                    <br>
                    <label for="phone">Telefone</label>
                    <input id="phone" type="tel" name="userPhone" pattern="[0-9]{11}" placeholder ="DDD + número sem espaço e sem hífen">
                    <br>
                    <label for="image">Upload de foto</label>
                    <input id="image" type="file" accept= image/* name="userImage">
                    <br>
                    </fieldset>   
                    
                    <fieldset>
                        <legend>Perfil</legend>
                        <p>Gênero:</p>

                        <input id="fem" type="radio" name="userGender" value="Feminino" >
                        <label for="fem">Feminino</label>
                        
                        <input id="masc" type="radio" name="userGender" value="Masculino" >
                        <label for="masc">Masculino</label>
                        
                        <input id="notInform" type="radio" name="userGender" value="Prefiro não informar" >
                        <label for="notInform">Prefiro não informar</label>
                        <br>
                        <label for="maritalStatus">Estado civil</label>
                        <select id="maritalStatus" name="userMaritalStatus">
                            <option value="casado">Casado</option>
                            <option value="solteiro">Solteiro</option>
                            <option value="divorciado">Divorciado</option>
                            <option value="outro">Outro</option>
                        </select>
                        <br>
                        <label for="state">Estado</label>
                        <select id="state" name="userState">
                            <option value="acre">Acre</option>
                            <option value="alagoas">Alagoas</option>
                            <option value="amapa">Amapá</option>
                            <option value="amazonas">Amazonas</option>
                            <option value="bahia">Bahia</option>
                            <option value="ceara">Ceará</option>
                            <option value="distritoFederal">Distrito Federal</option>
                            <option value="espiritoSanto">Espirito Santo</option>
                            <option value="goias">Goiás</option>
                            <option value="maranhao">Maranhão</option>
                            <option value="matoGrossoDoSul">Mato Grosso do Sul</option>
                            <option value="matoGrosso">Mato Grosso</option>
                            <option value="Minas Gerais">Minas Gerais</option>
                            <option value="para">Pará</option>
                            <option value="paraiba">Paraíba</option>
                            <option value="parana">Paraná</option>
                            <option value="pernambuco">Pernambuco</option>
                            <option value="piaui">Piauí</option>
                            <option value="rioDeJaneiro">Rio de Janeiro</option>
                            <option value="rioGrandeDoNorte">Rio Grande do Norte</option>
                            <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                            <option value="rondonia">Rondônia</option>
                            <option value="roraima">Roraima</option>
                            <option value="santaCatarina">Santa Catarina</option>
                            <option value="saoPaulo">São Paulo</option>
                            <option value="sergipe">Sergipe</option>
                            <option value="socantins">Tocantins</option>
                            </select>

                            <label for="userCity">Cidade:</label>
                            <input type="text" id="userCity" name="userCity" autocomplete="address-level2" placeholder="Ex.: Fortaleza" />
                        </fieldset> 
           <fieldset>
            <legend>Hábitos</legend>
            <p>Redes sociais</p>
            
            <input id="instagram" type="checkbox" name="social" value="instagram">
            <label for="instagram">Instagram</label> 
            <br>
            <input ind="facebook" type="checkbox" name="social" value="facebook">
            <label for="facebook">Facebook</label>
            <br>
            <input id="linkedin" type="checkbox" name="social" value="linkedin">
            <label for="linkedin">Linkedin</label>
            <br>
            <input id="x" type="checkbox" name="social" value="x">
            <label for="x">X</label>
            <br>
                    <label for="musicStyle">Estilo musical:</label>
                    <input list="styleTypes" id="musicStyle" name="userStyleMusic" type="text">
                    <datalist id="styleTypes">
                        <option value="Rock">
                        <option value="Mpb">
                        <option value="Reggae">
                        <option value="Samba">
                        <option value="Internacional">
                        </datalist>
                        <br>
                        <label for="favoriteColor">Cor favorita</label>
                        <input type="color" name="userFavoriteColor" id="favoriteColor"
                    
           </fieldset> 
       <fieldset>
                    <legend>Opinião</legend>
                    <p>O que você acha da qualidade do nosso serviço?</p>
                    
                    <input type="radio" id="otimo" name="userServiceOpinion" value="otima">
                    <label for="otimo">Ótima</label><br>

                    <input type="radio" id="boa" name="userServiceOpinion" value="boa">
                    <label for="boa">Boa</label><br>

                    <input type="radio" id="regular" name="userServiceOpinion" value="regular">
                    <label for="regular">Regular</label><br>

                    <input type="radio" id="ruim" name="userServiceOpinion" value="ruim">
                    <label for="ruim">Ruim</label><br>
                    <label for="comment">Escreva sua opinião:</label>
                    <textarea id="comment" name="userComment" placeholder="Digite aqui sua opinião..."></textarea>
        </fieldset>
 
    <button type="submit">Enviar</button>
        </form>
    </section>
</body>
</html>
